aid: xml
name: XML
description: XML (Extensible Markup Language) is a markup language and data format
  that defines rules for encoding documents in a way that is both human-readable and
  machine-readable. It is widely used for data interchange between systems, configuration
  files, web services (SOAP), and document formats like SVG and XHTML.
